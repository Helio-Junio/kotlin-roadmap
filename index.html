<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kotlin & Compose — Roadmap</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600;700&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0A0A0F;
  --bg2: #111118;
  --bg3: #18181F;
  --bg4: #1E1E28;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #F0EFF8;
  --text2: #9B99B8;
  --text3: #5E5C78;
  --purple: #7C6FF7;
  --purple2: #A89BFF;
  --purple3: #3D3680;
  --green: #4ECBA0;
  --green2: #1A5C47;
  --amber: #F0A429;
  --amber2: #5C3D0A;
  --coral: #F06060;
  --coral2: #5C1A1A;
  --blue: #4EA8F0;
  --blue2: #1A3A5C;
  --font-head: 'Syne', sans-serif;
  --font-code: 'JetBrains Mono', monospace;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-code);
  font-size: 14px;
  line-height: 1.6;
  min-height: 100vh;
  overflow-x: hidden;
}

/* GRID BG */
body::before {
  z-index: -1;
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(124,111,247,0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(124,111,247,0.04) 1px, transparent 1px);
  background-size: 48px 48px;
  pointer-events: none;
  z-index: 0;
}

.glow {
  position: fixed;
  width: 600px; height: 600px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(124,111,247,0.12) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  top: -200px; left: -200px;
  animation: driftGlow 12s ease-in-out infinite alternate;
}
.glow2 {
  position: fixed;
  width: 500px; height: 500px;
  border-radius: 50%;
  background: radial-gradient(circle, rgba(78,203,160,0.08) 0%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  bottom: -100px; right: -100px;
  animation: driftGlow2 15s ease-in-out infinite alternate;
}
@keyframes driftGlow  { to { transform: translate(80px, 60px); } }
@keyframes driftGlow2 { to { transform: translate(-60px, -40px); } }

/* LAYOUT */
#app { position: relative; z-index: 2; display: flex; min-height: 100vh; }

/* SIDEBAR */
#sidebar {
  width: 260px;
  min-height: 100vh;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  left: 0; top: 0; bottom: 0;
  overflow-y: auto;
  z-index: 100;
  transition: transform 0.3s;
}

.sidebar-logo {
  padding: 24px 20px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .logo-kt {
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 800;
  color: var(--purple2);
  letter-spacing: -0.5px;
}
.sidebar-logo .logo-sub {
  font-size: 11px;
  color: var(--text3);
  margin-top: 2px;
  letter-spacing: 0.08em;
  text-transform: uppercase;
}

.sidebar-progress-wrap {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-progress-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
  display: flex;
  justify-content: space-between;
}
.sidebar-progress-bar {
  height: 4px;
  background: var(--bg4);
  border-radius: 999px;
  overflow: hidden;
}
.sidebar-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--purple), var(--green));
  border-radius: 999px;
  transition: width 0.5s ease;
}

.sidebar-nav { flex: 1; padding: 12px 0; }

.nav-phase-group { margin-bottom: 4px; }

.nav-phase-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px 20px;
  background: transparent;
  border: none;
  color: var(--text2);
  font-family: var(--font-code);
  font-size: 12px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
  border-radius: 0;
}
.nav-phase-btn:hover { background: var(--bg3); color: var(--text); }
.nav-phase-btn.active { background: var(--bg4); color: var(--purple2); }
.nav-phase-btn .phase-dot {
  width: 22px; height: 22px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 700;
  flex-shrink: 0;
  transition: all 0.15s;
}
.nav-phase-btn .phase-dot.done { background: var(--green2); color: var(--green); }
.nav-phase-btn .phase-dot.active { background: var(--purple3); color: var(--purple2); }
.nav-phase-btn .phase-dot.locked { background: var(--bg4); color: var(--text3); }
.nav-phase-btn .nav-check { margin-left: auto; color: var(--green); font-size: 12px; }

.nav-lesson-btn {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 7px 20px 7px 52px;
  background: transparent;
  border: none;
  color: var(--text3);
  font-family: var(--font-code);
  font-size: 11px;
  cursor: pointer;
  text-align: left;
  transition: all 0.15s;
}
.nav-lesson-btn:hover { color: var(--text2); }
.nav-lesson-btn.active { color: var(--purple2); }
.nav-lesson-btn.done { color: var(--green); }
.nav-lesson-btn::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: currentColor;
  flex-shrink: 0;
}

/* MAIN */
#main {
  margin-left: 260px;
  flex: 1;
  min-height: 100vh;
}

/* TOPBAR */
#topbar {
  position: sticky;
  top: 0;
  background: rgba(10,10,15,0.85);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid var(--border);
  padding: 12px 32px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  z-index: 50;
}
.topbar-breadcrumb { font-size: 12px; color: var(--text3); }
.topbar-breadcrumb span { color: var(--text2); }
.topbar-xp {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: var(--text2);
}
.xp-badge {
  background: var(--purple3);
  color: var(--purple2);
  padding: 3px 12px;
  border-radius: 999px;
  font-size: 11px;
  font-weight: 600;
}

/* CONTENT */
#content {
  padding: 40px 48px 80px;
  max-width: 900px;
}

/* SCREENS */
.screen { display: none; }
.screen.active { display: block; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

/* HOME SCREEN */
.home-hero {
  margin-bottom: 48px;
}
.home-hero .tag {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--green);
  background: rgba(78,203,160,0.1);
  border: 1px solid rgba(78,203,160,0.2);
  padding: 4px 14px;
  border-radius: 999px;
  margin-bottom: 20px;
  letter-spacing: 0.06em;
  text-transform: uppercase;
}
.home-hero h1 {
  font-family: var(--font-head);
  font-size: 48px;
  font-weight: 800;
  line-height: 1.1;
  letter-spacing: -1px;
  margin-bottom: 16px;
}
.home-hero h1 .accent { color: var(--purple2); }
.home-hero p {
  font-size: 15px;
  color: var(--text2);
  max-width: 560px;
  line-height: 1.7;
}

.phase-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 32px; }

.phase-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
  overflow: hidden;
}
.phase-card::before {
  content: '';
  position: absolute;
  inset: 0;
  opacity: 0;
  transition: opacity 0.2s;
}
.phase-card:hover { border-color: var(--border2); transform: translateY(-2px); }
.phase-card:hover::before { opacity: 1; }
.phase-card.c-purple::before { background: radial-gradient(circle at 0% 0%, rgba(124,111,247,0.08), transparent 60%); }
.phase-card.c-green::before  { background: radial-gradient(circle at 0% 0%, rgba(78,203,160,0.08), transparent 60%); }
.phase-card.c-blue::before   { background: radial-gradient(circle at 0% 0%, rgba(78,168,240,0.08), transparent 60%); }
.phase-card.c-amber::before  { background: radial-gradient(circle at 0% 0%, rgba(240,164,41,0.08), transparent 60%); }
.phase-card.c-coral::before  { background: radial-gradient(circle at 0% 0%, rgba(240,96,96,0.08), transparent 60%); }

.phase-card .card-num {
  font-family: var(--font-head);
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-bottom: 10px;
}
.c-purple .card-num { color: var(--purple2); }
.c-green  .card-num { color: var(--green); }
.c-blue   .card-num { color: var(--blue); }
.c-amber  .card-num { color: var(--amber); }
.c-coral  .card-num { color: var(--coral); }

.phase-card h3 {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 6px;
}
.phase-card p { font-size: 12px; color: var(--text3); line-height: 1.5; margin-bottom: 12px; }

.card-pills { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 14px; }
.pill {
  font-size: 10px;
  padding: 2px 8px;
  border-radius: 999px;
  font-weight: 500;
}
.c-purple .pill { background: var(--purple3); color: var(--purple2); }
.c-green  .pill { background: var(--green2); color: var(--green); }
.c-blue   .pill { background: var(--blue2); color: var(--blue); }
.c-amber  .pill { background: var(--amber2); color: var(--amber); }
.c-coral  .pill { background: var(--coral2); color: var(--coral); }

.card-progress { height: 2px; background: var(--bg4); border-radius: 999px; overflow: hidden; }
.card-progress-fill { height: 100%; border-radius: 999px; transition: width 0.5s; }
.c-purple .card-progress-fill { background: var(--purple); }
.c-green  .card-progress-fill { background: var(--green); }
.c-blue   .card-progress-fill { background: var(--blue); }
.c-amber  .card-progress-fill { background: var(--amber); }
.c-coral  .card-progress-fill { background: var(--coral); }

.card-weeks {
  position: absolute;
  top: 16px; right: 16px;
  font-size: 10px;
  color: var(--text3);
}

.phase-card.full-width { grid-column: 1 / -1; }

/* LESSON SCREEN */
.lesson-header { margin-bottom: 36px; }
.lesson-phase-tag {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 10px;
}
.lesson-header h1 {
  font-family: var(--font-head);
  font-size: 32px;
  font-weight: 800;
  letter-spacing: -0.5px;
  margin-bottom: 10px;
}
.lesson-header p { font-size: 14px; color: var(--text2); max-width: 600px; }

/* MODULE BLOCKS */
.module {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  margin-bottom: 16px;
  overflow: hidden;
}
.module-header {
  padding: 16px 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  cursor: pointer;
  user-select: none;
  transition: background 0.15s;
}
.module-header:hover { background: var(--bg3); }
.module-num {
  width: 28px; height: 28px;
  border-radius: 6px;
  background: var(--purple3);
  color: var(--purple2);
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  flex-shrink: 0;
}
.module-title {
  font-family: var(--font-head);
  font-size: 15px;
  font-weight: 600;
  flex: 1;
}
.module-toggle {
  color: var(--text3);
  font-size: 16px;
  transition: transform 0.2s;
}
.module.open .module-toggle { transform: rotate(180deg); }
.module-body {
  display: none;
  padding: 0 20px 20px;
  border-top: 1px solid var(--border);
}
.module.open .module-body { display: block; }

/* PROSE */
.prose { color: var(--text2); line-height: 1.8; }
.prose p { margin-bottom: 14px; }
.prose strong { color: var(--text); font-weight: 600; }
.prose h3 {
  font-family: var(--font-head);
  font-size: 16px;
  font-weight: 700;
  color: var(--text);
  margin: 20px 0 10px;
}
.prose ul { padding-left: 20px; margin-bottom: 14px; }
.prose ul li { margin-bottom: 6px; }

/* CODE BLOCKS */
pre {
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 20px;
  overflow-x: auto;
  margin: 16px 0;
  font-family: var(--font-code);
  font-size: 13px;
  line-height: 1.7;
  position: relative;
}
pre .copy-btn {
  position: absolute;
  top: 12px; right: 12px;
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--text3);
  font-family: var(--font-code);
  font-size: 10px;
  padding: 4px 10px;
  border-radius: 6px;
  cursor: pointer;
  transition: all 0.15s;
  letter-spacing: 0.04em;
}
pre .copy-btn:hover { color: var(--text); border-color: var(--border2); }
pre .copy-btn.copied { color: var(--green); border-color: var(--green2); }

code { font-family: var(--font-code); }
p code, li code {
  background: var(--bg3);
  color: var(--purple2);
  padding: 1px 6px;
  border-radius: 4px;
  font-size: 12px;
}

/* SYNTAX */
.kw  { color: #A89BFF; }
.fn  { color: #7EC8F0; }
.str { color: #F0A060; }
.cmt { color: #4A4870; }
.num { color: #F0A429; }
.cls { color: #4ECBA0; }
.ann { color: #F06060; }

/* CALLOUT */
.callout {
  border-radius: 10px;
  padding: 14px 18px;
  margin: 16px 0;
  display: flex;
  gap: 12px;
  font-size: 13px;
  line-height: 1.6;
}
.callout.info { background: rgba(78,168,240,0.08); border: 1px solid rgba(78,168,240,0.2); color: #7EC8F0; }
.callout.tip  { background: rgba(78,203,160,0.08); border: 1px solid rgba(78,203,160,0.2); color: var(--green); }
.callout.warn { background: rgba(240,164,41,0.08);  border: 1px solid rgba(240,164,41,0.2);  color: var(--amber); }
.callout-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }

/* TABLE */
table {
  width: 100%;
  border-collapse: collapse;
  margin: 16px 0;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 10px 14px;
  background: var(--bg3);
  color: var(--text2);
  font-weight: 600;
  border-bottom: 1px solid var(--border);
}
td {
  padding: 10px 14px;
  border-bottom: 1px solid var(--border);
  color: var(--text2);
}
tr:last-child td { border-bottom: none; }

/* EXERCISE CARDS */
.exercises { margin-top: 24px; }
.exercises h2 {
  font-family: var(--font-head);
  font-size: 20px;
  font-weight: 700;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 10px;
}
.ex-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 18px 20px;
  margin-bottom: 10px;
  transition: border-color 0.15s;
}
.ex-card:hover { border-color: var(--border2); }
.ex-card-top {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 8px;
}
.ex-num {
  width: 26px; height: 26px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 11px; font-weight: 700;
  flex-shrink: 0;
}
.ex-title { font-size: 14px; font-weight: 600; color: var(--text); flex: 1; }
.diff-badge {
  font-size: 10px;
  padding: 2px 10px;
  border-radius: 999px;
  font-weight: 600;
}
.diff-easy   { background: rgba(78,203,160,0.15); color: var(--green); }
.diff-medium { background: rgba(240,164,41,0.15);  color: var(--amber); }
.diff-hard   { background: rgba(240,96,96,0.15);   color: var(--coral); }
.done-pill { font-size: 10px; padding: 2px 10px; border-radius: 999px; background: rgba(78,203,160,0.15); color: var(--green); font-weight: 600; display: none; }
.ex-desc { font-size: 13px; color: var(--text3); line-height: 1.6; margin-bottom: 12px; }
.hint-box {
  background: rgba(240,164,41,0.06);
  border: 1px solid rgba(240,164,41,0.15);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 12px;
  color: var(--amber);
  margin-bottom: 12px;
  display: none;
  line-height: 1.6;
}
.hint-box.vis { display: block; }
.ex-actions { display: flex; gap: 8px; flex-wrap: wrap; }

/* BUTTONS */
button, .btn {
  font-family: var(--font-code);
  cursor: pointer;
  border: none;
  border-radius: 8px;
  padding: 8px 16px;
  font-size: 12px;
  transition: all 0.15s;
  display: inline-flex;
  align-items: center;
  gap: 6px;
}
.btn-ghost {
  background: transparent;
  border: 1px solid var(--border2);
  color: var(--text2);
}
.btn-ghost:hover { background: var(--bg3); color: var(--text); }
.btn-primary {
  background: var(--purple3);
  color: var(--purple2);
  border: 1px solid rgba(124,111,247,0.3);
}
.btn-primary:hover { background: rgba(124,111,247,0.25); }
.btn-success {
  background: var(--green2);
  color: var(--green);
  border: 1px solid rgba(78,203,160,0.3);
}
.btn-success:hover { background: rgba(78,203,160,0.2); }

/* STATS BAR */
.stats-bar {
  display: flex;
  gap: 12px;
  margin-bottom: 24px;
  flex-wrap: wrap;
}
.stat-item {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 12px 20px;
  font-size: 12px;
  color: var(--text3);
}
.stat-item span {
  display: block;
  font-family: var(--font-head);
  font-size: 22px;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 2px;
}

/* NAV BOTTOM */
.lesson-nav {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-top: 40px;
  padding-top: 24px;
  border-top: 1px solid var(--border);
}

/* MOBILE TOGGLE */
.mobile-toggle {
  display: none;
  position: fixed;
  top: 12px; left: 12px;
  z-index: 200;
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  border-radius: 8px;
  padding: 8px 12px;
  font-size: 16px;
}

@media (max-width: 768px) {
  #sidebar { transform: translateX(-100%); }
  #sidebar.open { transform: translateX(0); }
  #main { margin-left: 0; }
  #content { padding: 20px 20px 60px; }
  .home-hero h1 { font-size: 32px; }
  .phase-cards { grid-template-columns: 1fr; }
  .mobile-toggle { display: flex; }
  .phase-card.full-width { grid-column: 1; }
}

/* SCROLLBAR */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--bg4); border-radius: 999px; }
::-webkit-scrollbar-thumb:hover { background: var(--bg3); }
</style>
</head>
<body>
<div class="glow"></div>
<div class="glow2"></div>
<button class="mobile-toggle" onclick="toggleSidebar()">☰</button>

<div id="app">
  <nav id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-kt">Kotlin Roadmap</div>
      <div class="logo-sub">Zero → Mid Level</div>
    </div>
    <div class="sidebar-progress-wrap">
      <div class="sidebar-progress-label">
        <span>Progresso geral</span>
        <span id="progress-pct">0%</span>
      </div>
      <div class="sidebar-progress-bar">
        <div class="sidebar-progress-fill" id="progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="sidebar-nav" id="sidebar-nav"></div>
  </nav>

  <main id="main">
    <div id="topbar">
      <div class="topbar-breadcrumb" id="breadcrumb">
        <span>Início</span>
      </div>
      <div class="topbar-xp">
        <span>XP</span>
        <span class="xp-badge" id="xp-badge">0</span>
      </div>
    </div>

    <div id="content">
      <!-- screens injected by JS -->
    </div>
  </main>
</div>

<script>
// ─────────────────────────────────────────
// DATA
// ─────────────────────────────────────────
const PHASES = [
  {
    id: 'fase1',
    title: 'Kotlin Essencial',
    subtitle: 'A linguagem',

<div class="prose">
<p>Em Kotlin, toda variável é declarada com <code>val</code> (imutável) ou <code>var</code> (mutável). O compilador infere o tipo automaticamente.</p>
<p><strong>Regra de ouro:</strong> prefira sempre <code>val</code>. Use <code>var</code> só quando o valor realmente precisa mudar.</p>
</div>
<pre><code><span class="cmt">// val = não pode mudar (como "final" no Java)</span>
<span class="kw">val</span> nome: <span class="cls">String</span> = <span class="str">"Lucas"</span>
<span class="kw">val</span> idade = <span class="num">26</span>          <span class="cmt">// tipo inferido: Int</span>
<span class="kw">val</span> altura = <span class="num">1.75</span>       <span class="cmt">// tipo inferido: Double</span>
<span class="kw">val</span> ativo = <span class="kw">true</span>        <span class="cmt">// tipo inferido: Boolean</span>

<span class="cmt">// var = pode mudar</span>
<span class="kw">var</span> pontuacao = <span class="num">0</span>
pontuacao = <span class="num">100</span>
pontuacao += <span class="num">50</span>

println(<span class="str">"$nome tem $idade anos e $pontuacao pontos"</span>)
<span class="cmt">// saída: Lucas tem 26 anos e 150 pontos</span></code></pre>
<div class="callout tip"><span class="callout-icon">💡</span><div><strong>String templates</strong> — use <code>$variavel</code> ou <code>\${expressao}</code> direto na string. Muito mais limpo que concatenar com <code>+</code>.</div></div>
<pre><code><span class="kw">val</span> preco = <span class="num">29.90</span>
<span class="kw">val</span> desconto = <span class="num">0.10</span>
println(<span class="str">"Preço: R$ \${"%.2f".format(preco * (1 - desconto))}"</span>)
<span class="cmt">// saída: Preço: R$ 26.91</span></code></pre>
`

<pre><code><span class="cmt">// Função básica</span>
<span class="kw">fun</span> <span class="fn">saudacao</span>(nome: <span class="cls">String</span>): <span class="cls">String</span> {

<span class="cmt">// Parâmetros com valor padrão</span>
<span class="kw">fun</span> <span class="fn">criarPerfil</span>(nome: <span class="cls">String</span>, nivel: <span class="cls">String</span> = <span class="str">"junior"</span>) {

}</code></pre>

        content: `
<div class="prose">
<p>O maior diferencial do Kotlin. <strong>NullPointerException</strong> é o erro mais comum em Java. Kotlin elimina isso no nível de compilação.</p>
</div>
<pre><code><span class="cmt">// Tipo normal: NUNCA pode ser null</span>
<span class="kw">var</span> nome: <span class="cls">String</span> = <span class="str">"Lucas"</span>
<span class="cmt">// nome = null  ← ERRO de compilação!</span>

<span class="cmt">// Tipo nullable: pode ser null (adiciona ?)</span>
<span class="kw">var</span> apelido: <span class="cls">String</span>? = <span class="kw">null</span>
apelido = <span class="str">"Dev"</span>

<span class="cmt">// 1. Safe call operator (?.)</span>
println(apelido?.length)    <span class="cmt">// imprime length, ou null</span>

<span class="cmt">// 2. Elvis operator (?:) — "se null, use esse valor"</span>
<span class="kw">val</span> tamanho = apelido?.length ?: <span class="num">0</span>
println(<span class="str">"Tamanho: $tamanho"</span>)   <span class="cmt">// Tamanho: 3</span>

<span class="cmt">// 3. Let — executa bloco só se não for null</span>
apelido?.<span class="fn">let</span> {
    println(<span class="str">"Não é null: $it"</span>)
}</code></pre>
<div class="callout tip"><span class="callout-icon">💡</span><div>O operador <code>?:</code> (Elvis) é um dos mais usados no dia a dia com Jetpack Compose. Decore ele.</div></div>
`

<div class="prose">
<p>Sealed classes são a forma mais elegante de representar <strong>estados</strong> em um app. Você vai usar isso <em>todo dia</em> com Jetpack Compose.</p>

<pre><code><span class="kw">sealed class</span> <span class="cls">UiState</span>&lt;<span class="kw">out</span> T&gt; {
    <span class="kw">object</span> <span class="cls">Loading</span> : <span class="cls">UiState</span>&lt;Nothing&gt;()
    <span class="kw">data class</span> <span class="cls">Success</span>&lt;T&gt;(<span class="kw">val</span> data: T) : <span class="cls">UiState</span>&lt;T&gt;()
    <span class="kw">data class</span> <span class="cls">Error</span>(<span class="kw">val</span> message: <span class="cls">String</span>) : <span class="cls">UiState</span>&lt;Nothing&gt;()
}

<span class="kw">fun</span> <span class="fn">processarEstado</span>(estado: <span class="cls">UiState</span>&lt;<span class="cls">String</span>&gt;) {
    <span class="kw">when</span> (estado) {
        <span class="kw">is</span> <span class="cls">UiState</span>.Loading -> println(<span class="str">"Carregando..."</span>)
        <span class="kw">is</span> <span class="cls">UiState</span>.Success -> println(<span class="str">"Dados: \${estado.data}"</span>)
        <span class="kw">is</span> <span class="cls">UiState</span>.Error   -> println(<span class="str">"Erro: \${estado.message}"</span>)

<pre><code><span class="kw">import</span> kotlinx.coroutines.*

<span class="kw">fun</span> <span class="fn">main</span>() = runBlocking {
    println(<span class="str">"Início"</span>)

    <span class="kw">val</span> job = <span class="fn">launch</span> {
        <span class="fn">delay</span>(<span class="num">1000</span>)  <span class="cmt">// não bloqueia!</span>

    }

    println(<span class="str">"Executa ANTES da coroutine terminar"</span>)
    job.<span class="fn">join</span>()
    println(<span class="str">"Fim"</span>)

<span class="cmt">// suspend = função que pode ser pausada</span>
<span class="kw">suspend fun</span> <span class="fn">buscarDados</span>(): <span class="cls">String</span> {
    <span class="fn">delay</span>(<span class="num">500</span>)  <span class="cmt">// simula chamada de rede</span>

}</code></pre>

<span class="ann">@Preview</span>(showBackground = <span class="kw">true</span>)
<span class="ann">@Composable</span>

<div class="prose">
<p><strong>Regra fundamental:</strong> quando o estado muda, o Compose <em>recompõe</em> os composables que dependem dele, atualizando a UI automaticamente.</p>
</div>
<pre><code><span class="ann">@Composable</span>
<span class="kw">fun</span> <span class="fn">Contador</span>() {
    <span class="cmt">// remember: mantém o valor entre recomposições</span>
    <span class="cmt">// mutableStateOf: cria um estado observável</span>
    <span class="kw">var</span> contador <span class="kw">by</span> <span class="fn">remember</span> { <span class="fn">mutableStateOf</span>(<span class="num">0</span>) }

    <span class="fn">Column</span>(horizontalAlignment = <span class="cls">Alignment</span>.CenterHorizontally) {
        <span class="fn">Text</span>(text = <span class="str">"$contador"</span>, fontSize = <span class="num">48</span>.sp)
        <span class="fn">Row</span>(horizontalArrangement = <span class="cls">Arrangement</span>.<span class="fn">spacedBy</span>(<span class="num">8</span>.dp)) {
            <span class="fn">Button</span>(onClick = { contador-- }) { <span class="fn">Text</span>(<span class="str">"-"</span>) }
            <span class="fn">Button</span>(onClick = { contador++ }) { <span class="fn">Text</span>(<span class="str">"+"</span>) }
        }
    }
}</code></pre>
<div class="callout tip"><span class="callout-icon">💡</span><div>Quando <code>contador++</code> executa, o Compose detecta a mudança e re-executa o composable automaticamente. Sem <code>setText()</code>, sem nada manual.</div></div>
`
      },
      {

<div class="prose">
<p>State hoisting = mover o estado pra cima, deixando composables filhos sem estado próprio. Torna os componentes <strong>reutilizáveis e testáveis</strong>.</p>
<p><strong>Regra prática: estado desce, eventos sobem.</strong></p>
</div>
<pre><code><span class="cmt">// ❌ Stateful — difícil de reutilizar</span>
<span class="ann">@Composable</span>
<span class="kw">fun</span> <span class="fn">BotaoRuim</span>() {

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const STORE_KEY = 'kt_roadmap_v1';

function loadStore() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    return raw ? JSON.parse(raw) : { done: {}, xp: 0, openModules: {} };
  } catch(e) {
    return { done: {}, xp: 0, openModules: {} };
  }
}

function saveStore(s) {
  try { localStorage.setItem(STORE_KEY, JSON.stringify(s)); } catch(e) {}
}

let store = loadStore();
let currentScreen = 'home';
let currentPhase = null;

// ─────────────────────────────────────────
// PROGRESS
// ─────────────────────────────────────────
function totalExercises() {
  return PHASES.reduce((a, p) => a + p.exercises.length, 0);
}

function doneCount() {
  return Object.values(store.done).filter(Boolean).length;
}

function phaseProgress(phase) {
  if (!phase.exercises.length) return 0;
  const d = phase.exercises.filter(e => store.done[e.id]).length;
  return Math.round((d / phase.exercises.length) * 100);
}

function updateProgressUI() {
  const total = totalExercises();
  const done = doneCount();
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('progress-fill').style.width = pct + '%';
  document.getElementById('progress-pct').textContent = pct + '%';
  document.getElementById('xp-badge').textContent = store.xp;
}

// ─────────────────────────────────────────
// SIDEBAR
// ─────────────────────────────────────────
function buildSidebar() {
  const nav = document.getElementById('sidebar-nav');
  nav.innerHTML = '';

  // Home button
  const homeBtn = document.createElement('button');
  homeBtn.className = 'nav-phase-btn' + (currentScreen === 'home' ? ' active' : '');
  homeBtn.innerHTML = '<div class="phase-dot active">⌂</div> Início';
  homeBtn.onclick = () => showHome();
  nav.appendChild(homeBtn);

  PHASES.forEach(phase => {
    const prog = phaseProgress(phase);
    const isDone = prog === 100 && phase.exercises.length > 0;
    const isActive = currentPhase === phase.id;

    const group = document.createElement('div');
    group.className = 'nav-phase-group';

    const btn = document.createElement('button');
    btn.className = 'nav-phase-btn' + (isActive ? ' active' : '');
    btn.innerHTML = `
      <div class="phase-dot ${isDone ? 'done' : isActive ? 'active' : 'locked'}">${isDone ? '✓' : PHASES.indexOf(phase) + 1}</div>
      <span>${phase.title}</span>
      ${isDone ? '<span class="nav-check">✓</span>' : ''}
    `;
    btn.onclick = () => showPhase(phase.id);
    group.appendChild(btn);

    if (isActive && phase.modules.length > 0) {
      phase.modules.forEach(mod => {
        const lb = document.createElement('button');
        lb.className = 'nav-lesson-btn';
        lb.textContent = mod.title;
        lb.onclick = () => {
          const el = document.getElementById('mod-' + mod.id);
          if (el) { el.scrollIntoView({ behavior: 'smooth', block: 'start' }); }
        };
        group.appendChild(lb);
      });
    }

    nav.appendChild(group);
  });
}

// ─────────────────────────────────────────
// SCREENS
// ─────────────────────────────────────────
function showHome() {
  currentScreen = 'home';
  currentPhase = null;
  buildSidebar();
  document.getElementById('breadcrumb').innerHTML = '<span>Início</span>';

  const content = document.getElementById('content');
  content.innerHTML = `
    <div class="screen active">
      <div class="home-hero">
        <div class="tag">✦ 10 semanas · intensivo</div>
        <h1>Kotlin + <span class="accent">Compose</span><br>do zero ao mid-level</h1>
        <p>Roadmap completo com aulas, exercícios práticos e projetos reais para o portfólio. Cada fase construída em cima da anterior.</p>
      </div>

      <div class="stats-bar">
        <div class="stat-item"><span id="h-done">${doneCount()}</span>exercícios feitos</div>
        <div class="stat-item"><span>${totalExercises()}</span>total de exercícios</div>
        <div class="stat-item"><span>${store.xp}</span>XP acumulado</div>
        <div class="stat-item"><span>10</span>semanas</div>
      </div>

      <div class="phase-cards">
        ${PHASES.map((p, i) => `
          <div class="phase-card ${p.color}${i === 4 ? ' full-width' : ''}" onclick="showPhase('${p.id}')">
            <div class="card-weeks">${p.weeks}</div>
            <div class="card-num">Fase ${i + 1}</div>
            <h3>${p.title}</h3>
            <p>${p.subtitle}</p>
            <div class="card-pills">${p.pills.map(pl => `<span class="pill">${pl}</span>`).join('')}</div>
            <div class="card-progress">
              <div class="card-progress-fill" style="width:${phaseProgress(p)}%"></div>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `;
  updateProgressUI();
}

function showPhase(phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  if (!phase) return;

  currentScreen = 'phase';
  currentPhase = phaseId;
  buildSidebar();

  document.getElementById('breadcrumb').innerHTML = `Roadmap → <span>${phase.title}</span>`;

  const content = document.getElementById('content');

  // Coming soon for phases 3-5
  if (phase.modules.length === 0) {
    content.innerHTML = `
      <div class="screen active">
        <div class="lesson-header">
          <div class="lesson-phase-tag">Fase ${PHASES.indexOf(phase) + 1} · ${phase.weeks}</div>
          <h1>${phase.title}</h1>
          <p>${phase.subtitle}</p>
        </div>
        <div class="callout info">
          <span class="callout-icon">🚧</span>
          <div>
            <strong>Em breve!</strong> Complete as Fases 1 e 2 primeiro. O conteúdo desta fase será liberado conforme você avança — fale com o Claude no chat para iniciar as aulas da Fase ${PHASES.indexOf(phase) + 1}.
          </div>
        </div>
        <div class="card-pills" style="margin-top:20px;display:flex;flex-wrap:wrap;gap:8px;">
          ${phase.pills.map(pl => `<span class="pill ${phase.color.replace('c-','')}-pill" style="font-size:12px;padding:6px 14px;border-radius:999px;background:var(--bg3);color:var(--text2);">${pl}</span>`).join('')}
        </div>
      </div>
    `;
    return;
  }

  const modulesHTML = phase.modules.map((mod, i) => `
    <div class="module ${store.openModules[mod.id] ? 'open' : ''}" id="mod-${mod.id}">
      <div class="module-header" onclick="toggleModule('${mod.id}')">
        <div class="module-num">${i + 1}</div>
        <span class="module-title">${mod.title}</span>
        <span class="module-toggle">▼</span>
      </div>
      <div class="module-body">
        <div style="padding-top:16px">${mod.content}</div>
      </div>
    </div>
  `).join('');

  const exHTML = phase.exercises.map((ex, i) => {
    const isDone = store.done[ex.id];
    const diffMap = { easy:'fácil', medium:'médio', hard:'desafio' };
    const diffClass = { easy:'diff-easy', medium:'diff-medium', hard:'diff-hard' };
    const numColors = ['n1','n2','n3','n4','n5','n6','n7','n8'];
    return `
      <div class="ex-card" id="excard-${ex.id}">
        <div class="ex-card-top">
          <div class="ex-num ${numColors[i]}">${i + 1}</div>
          <span class="ex-title">${ex.title}</span>
          <span class="diff-badge ${diffClass[ex.diff]}">${diffMap[ex.diff]}</span>
          <span class="done-pill" id="done-${ex.id}" style="display:${isDone ? 'inline-block' : 'none'}">concluído</span>
        </div>
        <p class="ex-desc">${ex.desc}</p>
        <div class="hint-box" id="hint-${ex.id}">${ex.hint}</div>
        <div class="ex-actions">
          <button class="btn btn-ghost" onclick="toggleHint('${ex.id}')">💡 dica</button>
          <button class="btn btn-primary" onclick="askSolution('${ex.id}', '${phase.id}')">ver solução ↗</button>
          <button class="btn btn-success ${isDone ? '' : ''}" onclick="markDone('${ex.id}')">${isDone ? '✓ feito' : 'marcar como feito'}</button>
        </div>
      </div>
    `;
  }).join('');

  const totalDone = phase.exercises.filter(e => store.done[e.id]).length;

  content.innerHTML = `
    <div class="screen active">
      <div class="lesson-header">
        <div class="lesson-phase-tag">Fase ${PHASES.indexOf(phase) + 1} · ${phase.weeks}</div>
        <h1>${phase.title}</h1>
        <p>${phase.subtitle} — ${phase.modules.length} módulos · ${phase.exercises.length} exercícios</p>
      </div>

      <div class="stats-bar">
        <div class="stat-item"><span>${phase.modules.length}</span>módulos</div>
        <div class="stat-item"><span id="phase-done-count">${totalDone}</span>exercícios feitos</div>
        <div class="stat-item"><span>${phase.exercises.length}</span>total</div>
        <div class="stat-item"><span>${phaseProgress(phase)}%</span>progresso</div>
      </div>

      <div id="modules-section">
        <h2 style="font-family:var(--font-head);font-size:20px;font-weight:700;margin-bottom:16px;">📖 Aulas</h2>
        ${modulesHTML}
      </div>

      <div class="exercises" style="margin-top:32px;">
        <h2>🎯 Exercícios</h2>
        ${exHTML}
      </div>

      <div class="lesson-nav">
        <button class="btn btn-ghost" onclick="showHome()">← Voltar ao início</button>
        ${PHASES.indexOf(phase) < PHASES.length - 1 ?
          `<button class="btn btn-primary" onclick="showPhase('${PHASES[PHASES.indexOf(phase)+1].id}')">Próxima fase →</button>` : ''}
      </div>
    </div>
  `;

  addCopyButtons();
  updateProgressUI();
  window.scrollTo({ top: 0 });
}

// ─────────────────────────────────────────
// ACTIONS
// ─────────────────────────────────────────
function toggleModule(modId) {
  const el = document.getElementById('mod-' + modId);
  const isOpen = el.classList.toggle('open');
  store.openModules[modId] = isOpen;
  saveStore(store);
}

function toggleHint(exId) {
  document.getElementById('hint-' + exId).classList.toggle('vis');
}

function markDone(exId) {
  if (!store.done[exId]) {
    store.done[exId] = true;
    store.xp += 50;
    saveStore(store);
    document.getElementById('done-' + exId).style.display = 'inline-block';
    document.getElementById('xp-badge').textContent = store.xp;

    // update phase done count
    const countEl = document.getElementById('phase-done-count');
    if (countEl) {
      const phase = PHASES.find(p => p.exercises.some(e => e.id === exId));
      if (phase) countEl.textContent = phase.exercises.filter(e => store.done[e.id]).length;
    }

    updateProgressUI();
    buildSidebar();

    // Confetti micro-feedback
    const btn = event.currentTarget;
    btn.textContent = '✓ feito!';
    btn.style.background = 'var(--green2)';
    btn.style.color = 'var(--green)';
  }
}

function askSolution(exId, phaseId) {
  const phase = PHASES.find(p => p.id === phaseId);
  const ex = phase.exercises.find(e => e.id === exId);
  const phaseNum = PHASES.indexOf(phase) + 1;
  const exNum = phase.exercises.indexOf(ex) + 1;

  // Create a message to send back to Claude
  const msg = `Me mostre a solução completa e detalhada do Exercício ${exNum} da Fase ${phaseNum} de ${phase.title}: ${ex.title}.`;
  const encoded = encodeURIComponent(msg);

  // Copy to clipboard and alert
  navigator.clipboard.writeText(msg).then(() => {
    showToast('📋 Mensagem copiada! Cole no chat com o Claude.');
  }).catch(() => {
    showToast('💬 Copie e cole no chat: "' + msg.substring(0, 60) + '..."');
  });
}

function showToast(msg) {
  let toast = document.getElementById('toast');
  if (!toast) {
    toast = document.createElement('div');
    toast.id = 'toast';
    toast.style.cssText = `
      position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(100px);
      background:var(--bg3);border:1px solid var(--border2);color:var(--text);
      padding:12px 24px;border-radius:10px;font-size:13px;z-index:9999;
      transition:transform 0.3s;white-space:nowrap;font-family:var(--font-code);
      box-shadow:0 8px 32px rgba(0,0,0,0.4);
    `;
    document.body.appendChild(toast);
  }
  toast.textContent = msg;
  toast.style.transform = 'translateX(-50%) translateY(0)';
  setTimeout(() => { toast.style.transform = 'translateX(-50%) translateY(100px)'; }, 3500);
}

function addCopyButtons() {
  document.querySelectorAll('pre code').forEach(block => {
    const pre = block.parentElement;
    if (pre.querySelector('.copy-btn')) return;
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'copiar';
    btn.onclick = () => {
      const text = block.innerText;
      navigator.clipboard.writeText(text).then(() => {
        btn.textContent = 'copiado!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'copiar'; btn.classList.remove('copied'); }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('open');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
showHome();
